<div class="hero-wrap">
  <div class="hero-stage hero-switch" id="hero-stage">
    <div
      class="hero-bg hero-switch ambient-gradient ambient-gradient--hero ambient-gradient--theme-1"
      data-glow="mouse"
      aria-hidden="true"
    >
      <div class="hero-player" id="hero-player-wrap">
        <picture class="hero-player-picture">
          <source id="hero-img-webp" srcset="assets/img/image_hero1.webp" type="image/webp">
          <img
            id="hero-img-png"
            src="assets/img/image_hero1.png"
            alt="Illustration principale Brewyart"
          >
        </picture>
      </div>
    </div>

    <div class="hero-card hero-switch">
      <div class="hero-card-inner">
        <p class="hero-kicker" id="hero-kicker"></p>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-text" id="hero-text"></p>

        <div class="hero-actions">
          <a href="#services" class="hero-btn" id="hero-primary-btn"></a>
          <a href="#projets" class="hero-btn-secondary" id="hero-secondary-btn"></a>
        </div>

        <div class="hero-tags" id="hero-tags"></div>
      </div>
    </div>

    <div class="hero-controls" aria-label="Navigation hero">
      <button class="hero-arrow hero-prev" type="button" aria-label="Slide précédente">‹</button>

      <div class="hero-progress">
        <span class="hero-current">01</span>
        <div class="hero-bar">
          <div class="hero-bar-fill"></div>
        </div>
        <span class="hero-total">04</span>
      </div>

      <button class="hero-arrow hero-next" type="button" aria-label="Slide suivante">›</button>
    </div>
  </div>
</div>
